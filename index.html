<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<title>Groq Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --accent: #7c6af7; --accent2: #f76a8a; --accent3: #6af7c8;
    --text: #e8e8f0; --muted: #6b6b8a; --border: rgba(124,106,247,0.2);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(124,106,247,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,106,247,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: drift 8s ease-in-out infinite alternate; }
  .bg-orb1 { width: 300px; height: 300px; background: rgba(124,106,247,0.12); top: -100px; right: -50px; }
  .bg-orb2 { width: 200px; height: 200px; background: rgba(247,106,138,0.08); bottom: 100px; left: -80px; animation-delay: -4s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,30px) scale(1.1); } }
  .app { position: relative; z-index: 1; width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; padding: 16px; gap: 12px; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 12px 0 4px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .model-badge { font-size: 0.6rem; color: var(--accent3); border: 1px solid rgba(106,247,200,0.3); padding: 3px 8px; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; }
  .api-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .api-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); }
  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; outline: none; transition: border-color 0.2s; }
  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--muted); }
  .save-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 14px; font-family: 'DM Mono', monospace; font-size: 0.7rem; cursor: pointer; white-space: nowrap; }
  .save-btn:active { opacity: 0.7; }
  .api-status { font-size: 0.65rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; }
  .status-dot.active { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }
  .conversation { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 4px 0; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .conversation::-webkit-scrollbar { display: none; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); text-align: center; padding: 40px 20px; }
  .empty-icon { font-size: 2.5rem; opacity: 0.4; }
  .empty-text { font-size: 0.75rem; line-height: 1.6; }
  .message { display: flex; flex-direction: column; gap: 4px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg-label { font-size: 0.55rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 0 4px; }
  .msg-label.you { color: var(--accent); }
  .msg-label.ai { color: var(--accent3); }
  .msg-bubble { padding: 10px 14px; border-radius: 12px; font-size: 0.8rem; line-height: 1.6; border: 1px solid transparent; }
  .msg-bubble.you { background: rgba(124,106,247,0.12); border-color: rgba(124,106,247,0.2); border-bottom-right-radius: 4px; }
  .msg-bubble.ai { background: var(--surface); border-color: var(--border); border-bottom-left-radius: 4px; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; border-bottom-left-radius: 4px; }
  .thinking-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; }
  .thinking-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .thinking-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  .controls { display: flex; flex-direction: column; align-items: center; gap: 12px; padding: 8px 0 12px; }
  .mic-outer { position: relative; display: flex; align-items: center; justify-content: center; }
  .mic-ring { position: absolute; width: 90px; height: 90px; border-radius: 50%; border: 2px solid var(--accent); opacity: 0; pointer-events: none; }
  .mic-btn { width: 72px; height: 72px; border-radius: 50%; border: none; background: linear-gradient(135deg, var(--accent), #5a4fd4); color: white; font-size: 1.6rem; cursor: pointer; display: flex; align-items: center; justify-content: center; position: relative; z-index: 1; box-shadow: 0 4px 20px rgba(124,106,247,0.4); user-select: none; transition: transform 0.15s; }
  .mic-btn:active { transform: scale(0.93); }
  .mic-btn.recording { background: linear-gradient(135deg, var(--accent2), #c0395a); box-shadow: 0 4px 24px rgba(247,106,138,0.5); animation: pulse 1.5s ease-in-out infinite; }
  .mic-btn.recording + .mic-ring { opacity: 1; animation: ripple 1.5s ease-out infinite; border-color: var(--accent2); }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  @keyframes ripple { 0% { transform: scale(1); opacity: 0.6; } 100% { transform: scale(1.8); opacity: 0; } }
  .mic-hint { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.06em; text-align: center; min-height: 1.2em; }
  .bottom-row { display: flex; gap: 10px; width: 100%; }
  .action-btn { flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; }
  .action-btn:active { background: var(--surface2); color: var(--text); }
  .speaking-bar { display: none; align-items: center; gap: 8px; font-size: 0.65rem; color: var(--accent3); }
  .speaking-bar.active { display: flex; }
  .wave { display: flex; gap: 2px; align-items: center; }
  .wave span { display: block; width: 3px; background: var(--accent3); border-radius: 2px; animation: wave 1s ease-in-out infinite alternate; }
  .wave span:nth-child(1) { height: 6px; } .wave span:nth-child(2) { height: 12px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 8px; animation-delay: 0.2s; } .wave span:nth-child(4) { height: 14px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 6px; animation-delay: 0.4s; }
  @keyframes wave { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
  .error-msg { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.3); border-radius: 8px; padding: 8px 12px; font-size: 0.7rem; color: var(--accent2); display: none; word-break: break-word; }
  .error-msg.show { display: block; }
  .interim-text { font-size: 0.7rem; color: var(--muted); font-style: italic; min-height: 1.2em; text-align: center; padding: 0 8px; }
  .test-btn { width: 100%; padding: 8px; border-radius: 8px; border: 1px dashed var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; }
  .test-btn:active { background: var(--surface); }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>
<div class="app">
  <div class="header">
    <div class="logo">GROQ VOICE</div>
    <div class="model-badge">llama-4-scout</div>
  </div>

  <div class="api-section">
    <div class="api-label">Groq API Key</div>
    <div class="api-row">
      <input class="api-input" id="apiKey" type="password" placeholder="gsk_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
      <button class="save-btn" onclick="saveKey()">Save</button>
    </div>
    <div class="api-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">No key saved</span>
    </div>
    <button class="test-btn" onclick="testConnection()">🔌 Test connection</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="conversation" id="conversation">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🎙️</div>
      <div class="empty-text">Tap the button and speak.<br>Groq will answer out loud.</div>
    </div>
  </div>

  <div class="controls">
    <div class="speaking-bar" id="speakingBar">
      <div class="wave"><span></span><span></span><span></span><span></span><span></span></div>
      Speaking...
    </div>
    <div class="interim-text" id="interimText"></div>
    <div class="mic-outer">
      <button class="mic-btn" id="micBtn" onclick="toggleRecording()">🎤</button>
      <div class="mic-ring" id="micRing"></div>
    </div>
    <div class="mic-hint" id="micHint">Tap to speak</div>
    <div class="bottom-row">
      <button class="action-btn" onclick="clearChat()">Clear chat</button>
      <button class="action-btn" onclick="stopSpeaking()">Stop speaking</button>
    </div>
  </div>
</div>

<script>
let recognition = null;
let isRecording = false;
let groqApiKey = '';
let finalTranscript = '';

// Try direct first, fall back to cors proxy
const ENDPOINTS = [
  'https://api.groq.com/openai/v1/chat/completions',
  'https://corsproxy.io/?https://api.groq.com/openai/v1/chat/completions',
  'https://api.allorigins.win/raw?url=' + encodeURIComponent('https://api.groq.com/openai/v1/chat/completions')
];

window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('groq_api_key');
  if (saved) { groqApiKey = saved; document.getElementById('apiKey').value = saved; setStatus(true, 'Key loaded ✓'); }
  initSpeechRecognition();
});

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showError('Speech recognition not supported. Please use Chrome.'); return; }
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onstart = () => {
    isRecording = true; finalTranscript = '';
    document.getElementById('micBtn').classList.add('recording');
    document.getElementById('micHint').textContent = 'Listening... tap to stop';
    document.getElementById('interimText').textContent = '';
    hideError();
  };

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('interimText').textContent = finalTranscript || interim;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('interimText').textContent = '';
    const text = finalTranscript.trim();
    if (text) { addMessage('you', text); askGroq(text); }
    else setHint('Tap to speak');
  };

  recognition.onerror = (e) => {
    isRecording = false;
    document.getElementById('micBtn').classList.remove('recording');
    document.getElementById('interimText').textContent = '';
    if (e.error === 'no-speech') { setHint('No speech — try again'); return; }
    if (e.error === 'not-allowed') { showError('Mic blocked. Tap the 🔒 in address bar → Site settings → Microphone → Allow'); return; }
    showError('Speech error: ' + e.error);
    setHint('Tap to speak');
  };
}

function toggleRecording() {
  if (!groqApiKey) { showError('Save your Groq API key first'); return; }
  if (!recognition) { showError('Speech recognition not available'); return; }
  if (isRecording) { recognition.stop(); }
  else { stopSpeaking(); try { recognition.start(); } catch(e) { showError('Mic error: ' + e.message); } }
}

function saveKey() {
  const val = document.getElementById('apiKey').value.trim();
  if (!val) { showError('Please enter your Groq API key'); return; }
  if (!val.startsWith('gsk_')) { showError('Key should start with gsk_ — check you copied the full key'); return; }
  groqApiKey = val;
  localStorage.setItem('groq_api_key', val);
  setStatus(true, 'Key saved ✓');
  hideError();
}

async function testConnection() {
  if (!groqApiKey) { showError('Save your API key first'); return; }
  setHint('Testing...');
  hideError();
  try {
    const result = await fetchGroq('Say "connection successful" and nothing else.');
    addMessage('ai', result);
    speak(result);
    setStatus(true, 'Connected ✓');
  } catch(e) {
    showError('Test failed: ' + e.message);
  }
  setHint('Tap to speak');
}

async function fetchGroq(prompt) {
  const body = JSON.stringify({
    model: 'meta-llama/llama-4-scout-17b-16e-instruct',
    messages: [
      { role: 'system', content: 'You are a helpful voice assistant. Give clear concise answers suitable for reading aloud. No markdown, no bullet points.' },
      { role: 'user', content: prompt }
    ],
    max_tokens: 400
  });

  // Try each endpoint until one works
  let lastError = '';
  for (const url of ENDPOINTS) {
    try {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${groqApiKey}`, 'Content-Type': 'application/json' },
        body
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        lastError = err.error?.message || `HTTP ${res.status}`;
        // If it's an auth error, no point trying other endpoints
        if (res.status === 401) throw new Error('Invalid API key — check console.groq.com');
        continue;
      }
      const data = await res.json();
      const answer = data.choices?.[0]?.message?.content?.trim();
      if (!answer) throw new Error('Empty response from Groq');
      return answer;
    } catch(e) {
      lastError = e.message;
      if (e.message.includes('Invalid API key')) throw e;
      // else try next endpoint
    }
  }
  throw new Error(lastError || 'All connection attempts failed');
}

async function askGroq(prompt) {
  addThinking();
  setHint('Thinking...');
  try {
    const answer = await fetchGroq(prompt);
    removeThinking();
    addMessage('ai', answer);
    speak(answer);
  } catch(e) {
    removeThinking();
    showError('Error: ' + e.message);
  }
  setHint('Tap to speak');
}

function speak(text) {
  stopSpeaking();
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.95; utter.pitch = 1; utter.lang = 'en-US';
  utter.onstart = () => document.getElementById('speakingBar').classList.add('active');
  utter.onend = () => document.getElementById('speakingBar').classList.remove('active');
  utter.onerror = () => document.getElementById('speakingBar').classList.remove('active');
  window.speechSynthesis.speak(utter);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  document.getElementById('speakingBar').classList.remove('active');
}

function addMessage(role, text) {
  document.getElementById('emptyState')?.remove();
  const div = document.createElement('div');
  div.className = 'message';
  div.innerHTML = `<div class="msg-label ${role}">${role === 'you' ? 'You' : 'Groq AI'}</div><div class="msg-bubble ${role}">${escapeHtml(text)}</div>`;
  document.getElementById('conversation').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function addThinking() {
  document.getElementById('emptyState')?.remove();
  const div = document.createElement('div');
  div.id = 'thinking'; div.className = 'message';
  div.innerHTML = `<div class="msg-label ai">Groq AI</div><div class="thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>`;
  document.getElementById('conversation').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth', block: 'end' });
}

function removeThinking() { document.getElementById('thinking')?.remove(); }

function clearChat() {
  stopSpeaking();
  document.getElementById('conversation').innerHTML = `<div class="empty-state" id="emptyState"><div class="empty-icon">🎙️</div><div class="empty-text">Tap the button and speak.<br>Groq will answer out loud.</div></div>`;
  hideError();
}

function setHint(t) { document.getElementById('micHint').textContent = t; }
function setStatus(active, text) { document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : ''); document.getElementById('statusText').textContent = text; }
function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = msg; el.classList.add('show'); }
function hideError() { document.getElementById('errorMsg').classList.remove('show'); }
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
