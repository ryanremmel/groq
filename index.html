<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>Gemini Voice AI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --accent: #4a86e8; --accent2: #a64dff; --accent3: #6af7c8;
    --text: #e8e8f0; --muted: #6b6b8a; --border: rgba(74,134,232,0.2);
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100dvh; }
  .bg-grid { position: fixed; inset: 0; background-image: linear-gradient(rgba(74,134,232,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(74,134,232,0.04) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
  .bg-orb { position: fixed; border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0; animation: drift 8s ease-in-out infinite alternate; }
  .bg-orb1 { width: 300px; height: 300px; background: rgba(74,134,232,0.12); top: -100px; right: -50px; }
  .bg-orb2 { width: 200px; height: 200px; background: rgba(166,77,255,0.08); bottom: 100px; left: -80px; animation-delay: -4s; }
  @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(20px,30px) scale(1.1); } }

  .app { position: relative; z-index: 1; width: 100%; max-width: 420px; height: 100dvh; display: flex; flex-direction: column; padding: 12px; gap: 8px; }

  .header { display: flex; align-items: center; justify-content: space-between; padding: 8px 0 2px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .model-badge { font-size: 0.55rem; color: var(--accent3); border: 1px solid rgba(106,247,200,0.3); padding: 3px 7px; border-radius: 20px; letter-spacing: 0.08em; text-transform: uppercase; }

  .api-row { display: flex; gap: 8px; align-items: center; }
  .api-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.7rem; outline: none; transition: border-color 0.2s; }
  .api-input:focus { border-color: var(--accent); }
  .api-input::placeholder { color: var(--muted); }
  .save-btn { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: 0.65rem; cursor: pointer; white-space: nowrap; }
  .api-row2 { display: flex; gap: 6px; }
  .test-btn { flex: 1; padding: 6px; border-radius: 7px; border: 1px dashed var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.6rem; cursor: pointer; text-transform: uppercase; letter-spacing: 0.06em; }
  .test-btn:active { background: var(--surface2); }
  .api-status { font-size: 0.6rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background 0.3s; flex-shrink: 0; }
  .status-dot.active { background: var(--accent3); box-shadow: 0 0 6px var(--accent3); }

  .error-msg { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.3); border-radius: 8px; padding: 7px 11px; font-size: 0.65rem; color: var(--accent2); display: none; word-break: break-word; }
  .error-msg.show { display: block; }

  .conversation { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding: 4px 0; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
  .conversation::-webkit-scrollbar { display: none; }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--muted); text-align: center; padding: 20px; }
  .empty-icon { font-size: 2rem; opacity: 0.4; }
  .empty-text { font-size: 0.7rem; line-height: 1.7; }
  .voice-cmds { font-size: 0.6rem; color: var(--muted); margin-top: 4px; line-height: 1.8; }
  .voice-cmds span { color: var(--accent3); }

  .message { display: flex; flex-direction: column; gap: 3px; animation: slideIn 0.3s ease; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-label { font-size: 0.52rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); padding: 0 4px; }
  .msg-label.you { color: var(--accent); }
  .msg-label.ai { color: var(--accent3); }
  .msg-bubble { padding: 8px 12px; border-radius: 10px; font-size: 0.78rem; line-height: 1.6; border: 1px solid transparent; }
  .msg-bubble.you { background: rgba(74,134,232,0.12); border-color: rgba(74,134,232,0.2); border-bottom-right-radius: 3px; }
  .msg-bubble.ai { background: var(--surface); border-color: var(--border); border-bottom-left-radius: 3px; }
  .thinking { display: flex; gap: 4px; align-items: center; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; border-bottom-left-radius: 3px; }
  .thinking-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s ease-in-out infinite; }
  .thinking-dot:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .thinking-dot:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-5px); } }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 8px; padding: 4px 0 8px; }

  .status-row { display: flex; align-items: center; justify-content: space-between; min-height: 20px; }
  .speaking-bar { display: none; align-items: center; gap: 6px; font-size: 0.6rem; color: var(--accent3); }
  .speaking-bar.active { display: flex; }
  .wave { display: flex; gap: 2px; align-items: center; }
  .wave span { display: block; width: 3px; background: var(--accent3); border-radius: 2px; animation: wave 1s ease-in-out infinite alternate; }
  .wave span:nth-child(1) { height: 5px; } .wave span:nth-child(2) { height: 10px; animation-delay: 0.1s; }
  .wave span:nth-child(3) { height: 7px; animation-delay: 0.2s; } .wave span:nth-child(4) { height: 12px; animation-delay: 0.3s; }
  .wave span:nth-child(5) { height: 5px; animation-delay: 0.4s; }
  @keyframes wave { from { transform: scaleY(0.5); } to { transform: scaleY(1); } }
  .muted-badge { display: none; font-size: 0.6rem; color: var(--accent2); border: 1px solid rgba(247,106,138,0.3); padding: 2px 7px; border-radius: 10px; }
  .muted-badge.show { display: block; }

  .interim-text { font-size: 0.68rem; color: var(--muted); font-style: italic; min-height: 1.1em; text-align: center; padding: 0 8px; }
  .mic-hint { font-size: 0.62rem; color: var(--muted); letter-spacing: 0.05em; text-align: center; min-height: 1.1em; }

  .mic-outer { display: flex; align-items: center; justify-content: center; position: relative; }
  .mic-ring { position: absolute; width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent2); opacity: 0; pointer-events: none; }
